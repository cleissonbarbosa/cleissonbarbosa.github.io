name: Generate Post Audio

on:
  push:
    branches: [main]
    paths:
      - "_posts/**"
  workflow_dispatch:
    inputs:
      max_posts:
        description: "Max posts to narrate this run (0 = no cap)"
        required: false
        default: "5"

permissions:
  contents: write
  pull-requests: write

env:
  BRANCH_NAME: audio/generated-by-narrator

jobs:
  narrate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y espeak-ng ffmpeg

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-narrate-${{ hashFiles('tools/narrate/requirements.txt') }}

      - name: Cache Kokoro model weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-kokoro-hf-v1

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install -r tools/narrate/requirements.txt

      - name: Dry run (list pending posts)
        run: |
          python tools/narrate/narrate.py --all-missing --dry-run

      - name: Narrate posts missing audio
        env:
          SITE_TITLE: ${{ github.repository_owner }}
        run: |
          MAX="${{ github.event.inputs.max_posts || '5' }}"
          python tools/narrate/narrate.py --all-missing --max-posts "$MAX"

      - name: Check for changes
        id: diff
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config --local user.name "R. Daneel Olivaw"
          git config --local user.email "cleissonbarbosa68@gmail.com"

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          base: main
          commit-message: "Generate narrated audio for new posts"
          title: "Audio narration for new posts"
          body: |
            ## Generated audio narration

            Kokoro TTS produced MP3 narration for every post that was missing an
            `audio:` field. Files were dropped into `assets/audio/posts/` and
            the post frontmatter was updated so the audio player renders.

            Generated by `.github/workflows/generate-audio.yml`.
          branch: ${{ env.BRANCH_NAME }}
          delete-branch: true
          author: "R. Daneel Olivaw <cleissonbarbosa68@gmail.com>"
          committer: "R. Daneel Olivaw <cleissonbarbosa68@gmail.com>"
          labels: "ai-generated,audio"
          add-paths: |
            _posts/**
            assets/audio/**
